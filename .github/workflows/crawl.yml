name: crawl

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'crawl target'
        required: false
        default: 'all'
  schedule:
    - cron: '0 1 * * *'

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Run stage 01
        env:
          HEADLESS: '1'
        run: |
          python -m src.pipelines.stage_01_collect_list_pages --target "${{ github.event.inputs.target || 'all' }}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawler-stage-01
          path: |
            data/raw
            data/stage/01_list_index
            data/runs

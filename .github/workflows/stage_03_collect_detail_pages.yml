name: Run Stage 03 Collect Detail Pages

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'detail collection target'
        required: false
        default: 'all'

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  HEADLESS: "1"

jobs:
  run-stage-03:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run stage 03
        id: run-automation
        continue-on-error: true
        env:
          HEADLESS: '1'
        run: |
          python -m src.pipelines.stage_03_collect_detail_pages --target "${{ github.event.inputs.target || 'all' }}"

      - name: Check outputs
        id: check-results
        shell: bash
        run: |
          set -euo pipefail

          if [ -d data/stage/03_detail_index ] && find data/stage/03_detail_index -type f -name '*.jsonl' | grep -q .; then
            file_count=$(find data/stage/03_detail_index data/raw data/runs -type f | wc -l | tr -d ' ')
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
            echo "✅ 找到输出文件 $file_count 个"
          else
            echo "status=no_file" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ 未找到 stage 03 输出文件"
          fi

      - name: Show changed files
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          echo "===== git status ====="
          git status --short || true
          echo
          echo "===== matched files ====="
          find data/raw -type f | sort || true
          find data/stage/03_detail_index -type f | sort || true
          find data/runs -type f -name 'stage_03_manifest.json' | sort || true

      - name: Configure git
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push outputs
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          set -euo pipefail

          git add -f data/raw/ data/stage/03_detail_index/ data/runs/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "🤖 Update stage 03 detail pages - $(date +%Y-%m-%d) [skip ci]"

          for i in 1 2 3; do
            echo "Push attempt $i"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}" || {
              git rebase --abort || true
              git pull --rebase origin "${GITHUB_REF_NAME}"
            }

            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed, retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1

      - name: Upload outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-03-detail-pages-output
          path: |
            data/raw/
            data/stage/03_detail_index/
            data/runs/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true

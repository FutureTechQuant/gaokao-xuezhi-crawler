name: gaokao-major-list

on:
  push:
    branches: [ main ]
    paths:
      - 'src/sources/gaokao/major_list_spider.py'
      - 'src/sources/gaokao/list_spider.py'
      - 'src/pipelines/stage_01_collect_list_pages.py'
      - 'src/common/**'
      - '.github/workflows/gaokao-major-list.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/sources/gaokao/major_list_spider.py'
      - 'src/sources/gaokao/list_spider.py'
      - 'src/pipelines/stage_01_collect_list_pages.py'
      - 'src/common/**'
      - '.github/workflows/gaokao-major-list.yml'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    env:
      TARGET: gaokao_major

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run stage 01
        run: python -m src.pipelines.stage_01_collect_list_pages --target ${TARGET}

      - name: Commit generated files
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore(data): update gaokao major stage01 [skip ci]"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gaokao-major-stage01
          path: |
            data/raw/gaokao/major/list_pages/**
            data/stage/01_list_index/**

name: Run Gaokao Major Detail

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/pipelines/stage_02_collect_detail_pages.py'
      - 'src/sources/gaokao/major_detail_spider.py'
      - 'src/sources/gaokao/_base_detail_spider.py'
      - 'src/pipelines/stage_01_collect_list_pages.py'
      - 'src/sources/gaokao/major_list_spider.py'
      - 'src/sources/gaokao/list_spider.py'
      - 'src/common/**'
      - '.github/workflows/gaokao-major-detail.yml'

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  HEADLESS: "1"
  TARGET: "gaokao_major"

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run stage 02
        id: run-stage02
        continue-on-error: true
        run: |
          python -m src.pipelines.stage_02_collect_detail_pages --target ${TARGET}

      - name: Check outputs
        id: check-results
        shell: bash
        run: |
          set -euo pipefail

          if [ -d data/stage/02_detail_index ] && find data/stage/02_detail_index -type f -name 'gaokao_major.jsonl' | grep -q .; then
            file_count=$(find data/stage/02_detail_index data/raw/gaokao/major/detail_pages data/runs -type f | wc -l | tr -d ' ')
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
            echo "✅ 找到 stage_02 输出文件 $file_count 个"
          else
            echo "status=no_file" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ 未找到 gaokao_major stage_02 输出文件"
          fi

      - name: Show changed files
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          echo "===== git status ====="
          git status --short || true
          echo
          echo "===== matched files ====="
          find data/raw/gaokao/major/detail_pages -type f | sort || true
          find data/stage/02_detail_index -type f -name 'gaokao_major*' | sort || true
          find data/runs -type f -name 'stage_02_manifest.json' | sort || true

      - name: Configure git
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push outputs
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          set -euo pipefail

          git add -f data/raw/gaokao/major/detail_pages/ data/stage/02_detail_index/ data/runs/

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "🤖 Update gaokao major detail outputs - $(date +%Y-%m-%d) [skip ci]"

          for i in 1 2 3; do
            echo "Push attempt $i"
            git fetch origin "${GITHUB_REF_NAME}"
            git rebase "origin/${GITHUB_REF_NAME}" || {
              git rebase --abort || true
              git pull --rebase origin "${GITHUB_REF_NAME}"
            }

            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed, retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1

      - name: Upload outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gaokao-major-detail-output
          path: |
            data/raw/gaokao/major/detail_pages/
            data/stage/02_detail_index/
            data/runs/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
